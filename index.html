<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>redcard1</title>
</head>
<body>
    <img id="logo" src="./Assets/logo.png" alt="logo">
    <div class="main">
        <section class="container">
            <div class="left">
                <h1>Submission</h1>
                <p>
                    All details of submissions will be kept strictly private
                    and confidential by Mailman and will not be used for any purposes other than judging Red Card 2018 Winners.
                </p>
                <label>
                    <input id="cb1" type="checkbox">
                </label>
                <h2>
                    Applications will close on the <br>
                    15th December 2017
                </h2>
                <label>
                    <input id="cb2" type="checkbox">
                </label>
            </div>
            <div class="right">
                <form>
                    <input type="text" placeholder="Name">
                    <input type="email" placeholder="Email Address">
                    <input type="text" placeholder="Organisation">
                    <h3>Which Award</h3>
                    <label>
                        <input type="checkbox">
                        Best Livestream
                    </label>
                    <textarea placeholder="Description & Results"></textarea>
                    <label>
                        <input type="checkbox">
                        Best Tour Campaign
                    </label>
                    <textarea placeholder="Description & Results"></textarea>
                    <label>
                        <input type="checkbox">
                        Best Sponsor Activation
                    </label>
                    <textarea placeholder="Description & Results"></textarea>
                    <button type="submit">Submission Successful</button>
                </form>
            </div>
        </section>

    </div>
</body>
</html>
